{% extends "base.html" %}
{% block content %}
<div style="padding:20px;">
    <a href="/adminpage" class="btn" style="margin-bottom:20px;">← Back to Dashboard</a>
    <h1 style="text-transform:uppercase;letter-spacing:4px;margin-bottom:20px;">Manage Permissions</h1>
    <div style="display:flex;gap:20px;">
        <div style="width:280px;border:1px solid var(--border);overflow-y:auto;max-height:calc(100vh - 150px);">
            {% for u in users %}
            <div class="contact-item" onclick="selectPermUser('{{ u.id }}','{{ u.full_name }}','{{ u.role }}')">
                <div class="contact-name">{{ u.full_name }}</div>
                {% if u.nickname %}<div class="contact-nick">{{ u.nickname }}</div>{% endif %}
                <div class="contact-status">{{ u.role }}</div>
            </div>
            {% endfor %}
        </div>
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;" id="perm-detail">
            <p style="color:var(--text-dim);">Select a user</p>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function selectPermUser(userId, name, role) {
    const col = document.getElementById('perm-detail');
    col.innerHTML = `
        <div class="perm-icon">
⠀⠀⠀⣀⣤⠤⠤⣤⣄⣀⠀⠀⠀
⠀⣠⡞⠉⠀⠀⠀⠀⠀⠉⠳⣄⠀
⢰⡏⠀⠰⣿⡷⠀⢿⣿⠆⠀⢹⣦
⢸⡃⠀⠀⠉⠁⠀⠈⠉⠀⠀⢸⣿
⠸⣇⠺⣦⡀⠀⠀⠀⢀⣴⠇⣸⠿
 ⠻⣦⡈⠙⠓⠒⠛⠋⣁⣴⠏⠀
⠀⠀⠈⠙⠓⠶⠶⠶⠛⠋⠀⠀⠀
        </div>
        <h2 style="margin-bottom:20px;">${name}</h2>
        <div class="perm-toggle">
            <div class="perm-option ${role==='user'?'active':''}" onclick="setRole('${userId}','user',this)">
                User ${role==='user'?'<span class="checkmark">✓</span>':''}
            </div>
            <div class="perm-option ${role==='admin'?'active':''}" onclick="setRole('${userId}','admin',this)">
                Administrator ${role==='admin'?'<span class="checkmark">✓</span>':''}
            </div>
        </div>
    `;
}

function setRole(userId, role) {
    fetch(`/api/admin/user/${userId}/set-role`, {
        method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({role:role})
    }).then(() => location.reload());
}
</script>
{% endblock %}
