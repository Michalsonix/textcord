{% extends "base.html" %}
{% block content %}
<div class="force-password-page">
    <div class="force-password-box">
        <h2 style="color: var(--warning);">Password Change Required</h2>
        {% if error %}<div class="error-msg" style="margin-top:10px;">{{ error }}</div>{% endif %}
        <form method="POST" style="margin-top: 15px;">
            <div class="form-row">
                <label>New Password</label>
                <input type="password" name="new_password" placeholder="Min 6 characters" required minlength="6">
            </div>
            <button type="submit" class="btn btn-full btn-warning" style="margin-top: 10px;">Change Password</button>
        </form>
    </div>
</div>
{% endblock %}
